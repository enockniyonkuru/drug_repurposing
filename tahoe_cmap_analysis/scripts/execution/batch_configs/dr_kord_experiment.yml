# DR-KORD DISEASE SIGNATURES ANALYSIS
# Using KORD disease signatures with Entrez gene IDs and logFC values

# ============================================================================
# DISEASE CONFIGURATION
# ============================================================================
disease:
  source: "DR-KORD Disease Signatures (2 datasets)"
  directory: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/dr_kord_analysis/dr_kord_disease_signatures"
  pattern: ".*\\.csv$"  # Match all CSV files in directory

# ============================================================================
# CMAP DRUG SIGNATURES CONFIGURATION
# ============================================================================
cmap:
  signatures: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/data/drug_signatures/cmap/cmap_signatures_shared_genes.RData"
  metadata: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/data/drug_signatures/cmap/cmap_drug_experiments_new.csv"
  valid_instances: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/data/drug_signatures/cmap/cmap_valid_instances_OG_015.csv"

# ============================================================================
# TAHOE DRUG SIGNATURES CONFIGURATION
# ============================================================================
tahoe:
  signatures: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/data/drug_signatures/tahoe/tahoe_signatures_shared_genes_only.RData"
  metadata: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/data/drug_signatures/tahoe/tahoe_drug_experiments_new.csv"

# ============================================================================
# GENE CONVERSION AND ANALYSIS
# ============================================================================
analysis:
  gene_table: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/data/gene_id_conversion_table.tsv"
  qval_threshold: 0.05
  
  # Column configuration for DR-KORD CSV files:
  # CSV columns: GeneID (Entrez), logfc_dz:173610 (or logfc_dz:305998), gene_symbol
  gene_key: "gene_symbol"  # Column name for gene symbols (pipeline maps to Entrez via g:Profiler)
  logfc_cols_pref: "logfc_dz"  # Prefix to match logfc_dz columns
  logfc_cutoff: 1.0  # Filter genes with |logFC| > 1.0
  use_averaging: true  # Average logFC values
  logfc_column_selection: "all"  # Use the single logFC column

# ============================================================================
# OUTPUT CONFIGURATION
# ============================================================================
output:
  root_directory: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/dr_kord_analysis/dr_kord_results_drpipe"
  report_directory: "/Users/enockniyonkuru/Desktop/drug_repurposing/tahoe_cmap_analysis/reports"
  report_prefix: "dr_kord_drpipe_analysis"

# ============================================================================
# RUNTIME OPTIONS
# ============================================================================
runtime:
  skip_existing_results: false  # Process all files, don't skip
  verbose: true
  # Start from first disease signature file
  start_from_disease: 1
  end_at_disease: null  # Process all available files
