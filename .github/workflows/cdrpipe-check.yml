name: CDRPipe Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

jobs:
  package-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Set up Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Install package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: CDRPipe
          extra-packages: |
            any::devtools
            any::roxygen2
            any::rcmdcheck

      - name: Regenerate roxygen docs
        run: Rscript -e 'roxygen2::roxygenise("CDRPipe")'

      - name: Ensure generated docs are committed
        run: git diff --exit-code -- CDRPipe/NAMESPACE CDRPipe/man

      - name: Run package tests and R CMD check
        run: Rscript scripts/ci/check_cdrpipe.R
